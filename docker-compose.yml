# ── Vigil — Docker Compose Orchestration ─────────────────────────────────
# Usage:
#   docker-compose up --build
#   docker-compose down

version: "3.9"

services:
  # ── Flask Backend API ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vigil-backend
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=vigil-super-secret-key-change-in-production
      - DATABASE_URI=sqlite:///vigil.db
    volumes:
      - backend-data:/app/instance   # Persist SQLite database
    restart: unless-stopped

  # ── React + Tailwind Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vigil-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000/api
    restart: unless-stopped

volumes:
  backend-data:
